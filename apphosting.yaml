kind: AppHostingConfiguration
schemaVersion: v1

runConfig:
  secretEnvironmentVariables:
    - key: SERVICE_ACCOUNT_PRIVATE_KEY
      secret: MY_SERVICE_ACCOUNT_KEY
    - key: GOOGLE_PRIVATE_KEY
      secret: MY_GOOGLE_API_KEY_SECRET
    - key: EMAIL_SERVER_PASSWORD
      secret: EMAIL_SERVER_PASSWORD
    - key: APPS_SCRIPT_SECRET_KEY
      secret: APPS_SCRIPT_SECRET_KEY

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
  - variable: NEXT_PUBLIC_FIREBASE_USE_EMULATOR
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_PORT
  - variable: NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST
  - variable: NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_PORT

  - variable: SERVICE_ACCOUNT_PROJECT_ID
  - variable: SERVICE_ACCOUNT_CLIENT_EMAIL

  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
  - variable: GOOGLE_CALENDAR_ID_ROOM_1
  - variable: GOOGLE_CALENDAR_ID_ROOM_2
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_1A
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_1B
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_2A
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_2B

  - variable: EMAIL_SERVER_HOST
  - variable: EMAIL_SERVER_PORT
  - variable: EMAIL_SERVER_USER
  - variable: EMAIL_FROM_NAME