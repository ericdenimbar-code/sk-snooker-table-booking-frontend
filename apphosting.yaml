kind: AppHostingConfiguration
schemaVersion: v1

# apphosting.yaml
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # =============================================================================

  # --- Firebase Admin SDK (後台管理 Firebase 資料庫用) ---
  # 請確保這個 Project ID 與你的 Admin SDK 初始化代碼使用的相匹配
  - variable: SERVICE_ACCOUNT_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: SERVICE_ACCOUNT_CLIENT_EMAIL
    availability:
      - BUILD
      - RUNTIME
  - variable: SERVICE_ACCOUNT_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME

  # --- Google Calendar API (後台管理 Google 日曆用) ---
  # 請注意，如果 GOOGLE_SERVICE_ACCOUNT_EMAIL 和 GOOGLE_PRIVATE_KEY 與 Admin SDK 的值相同，
  # 你可以在 apphosting.yaml 中重複設置 Secret 名稱，但 Secret Manager 中只需要存儲一次。
  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_ROOM_1
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_ROOM_2
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_1A
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_1B
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_2A
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID_DOOR_CONTROL_2B
    availability:
      - BUILD
      - RUNTIME

  # --- Nodemailer (後台發送 QR Code 郵件用) ---
  - variable: EMAIL_SERVER_HOST
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_SERVER_PORT
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_SERVER_USER
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_SERVER_PASSWORD
    availability:
      - BUILD
      - RUNTIME
  - variable: EMAIL_FROM_NAME
    availability:
      - BUILD
      - RUNTIME

  # --- Apps Script Webhook Secret ---
  - variable: APPS_SCRIPT_SECRET_KEY
    availability:
      - RUNTIME

# The runConfig block is essential for granting the Cloud Run service the permission to access secrets.
runConfig:
  secretEnvironmentVariables:
    - key: SERVICE_ACCOUNT_PRIVATE_KEY
      secret: MY_SERVICE_ACCOUNT_KEY
    - key: GOOGLE_PRIVATE_KEY
      secret: MY_GOOGLE_API_KEY_SECRET
    - key: EMAIL_SERVER_PASSWORD
      secret: email-server-password
    - key: APPS_SCRIPT_SECRET_KEY
      secret: APPS_SCRIPT_SECRET_KEY